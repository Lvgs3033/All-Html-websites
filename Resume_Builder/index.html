<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
          /* Light Theme - Simple Violet and White */
          --primary-gradient: linear-gradient(135deg, #8b5cf6 0%, #a855f7 50%, #9333ea 100%);
          --primary-light: #f3e8ff;
          --primary-medium: #8b5cf6;
          --primary-dark: #7c3aed;
          --accent-color: #8b5cf6;

          --bg-primary: #ffffff;
          --bg-secondary: #fefefe;
          --bg-tertiary: #f9fafb;
          --text-primary: #1f2937;
          --text-secondary: #4b5563;
          --text-muted: #9ca3af;
          --border-color: #e5e7eb;
          --shadow-light: rgba(139, 92, 246, 0.15);
          --shadow-medium: rgba(139, 92, 246, 0.25);
          --shadow-dark: rgba(31, 41, 55, 0.1);
        }

        [data-theme="dark"] {
          /* Dark Theme - Simple Violet and Dark */
          --primary-gradient: linear-gradient(135deg, #8b5cf6 0%, #a855f7 50%, #9333ea 100%);
          --primary-light: #2d1b69;
          --primary-medium: #8b5cf6;
          --primary-dark: #a855f7;
          --accent-color: #a855f7;

          --bg-primary: #111827;
          --bg-secondary: #1f2937;
          --bg-tertiary: #374151;
          --text-primary: #f9fafb;
          --text-secondary: #d1d5db;
          --text-muted: #9ca3af;
          --border-color: #4b5563;
          --shadow-light: rgba(168, 85, 247, 0.2);
          --shadow-medium: rgba(168, 85, 247, 0.3);
          --shadow-dark: rgba(0, 0, 0, 0.4);
        }

        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          background: var(--bg-tertiary);
          min-height: 100vh;
          padding: 20px;
          transition: all 0.3s ease;
        }

        .container {
          max-width: 1400px;
          margin: 0 auto;
          background: var(--bg-primary);
          border-radius: 20px;
          box-shadow: 0 25px 50px var(--shadow-dark);
          overflow: hidden;
          transition: all 0.3s ease;
          border: 1px solid var(--border-color);
        }

        /* Header with Theme Toggle */
        .app-header {
          background: var(--primary-gradient);
          padding: 20px 40px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          color: white;
        }

        .app-title {
          font-size: 1.8rem;
          font-weight: 700;
          display: flex;
          align-items: center;
          gap: 10px;
        }

        .theme-toggle {
          background: rgba(255, 255, 255, 0.2);
          border: none;
          border-radius: 25px;
          padding: 8px 16px;
          color: white;
          cursor: pointer;
          transition: all 0.3s ease;
          display: flex;
          align-items: center;
          gap: 8px;
          font-weight: 500;
        }

        .theme-toggle:hover {
          background: rgba(255, 255, 255, 0.3);
          transform: translateY(-2px);
        }

        /* Progress Bar */
        .progress-container {
          width: 100%;
          height: 6px;
          background: var(--bg-tertiary);
          position: relative;
          overflow: hidden;
        }

        .progress-bar {
          height: 100%;
          background: var(--primary-gradient);
          width: 0%;
          transition: width 0.3s ease;
          position: relative;
        }

        .progress-bar::after {
          content: "";
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
          animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
          0% {
            transform: translateX(-100%);
          }
          100% {
            transform: translateX(100%);
          }
        }

        .main-content {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 0;
          min-height: calc(100vh - 120px);
        }

        /* Form Section */
        .form-section {
          padding: 40px;
          background: var(--bg-secondary);
          overflow-y: auto;
          max-height: calc(100vh - 120px);
          transition: all 0.3s ease;
          border-right: 1px solid var(--border-color);
        }

        .form-section h2 {
          color: var(--text-primary);
          margin-bottom: 30px;
          font-size: 2rem;
          text-align: center;
          background: var(--primary-gradient);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          font-weight: 700;
        }

        /* Demo Buttons Section */
        .demo-section {
          background: var(--bg-primary);
          padding: 20px;
          margin: 20px 0;
          border-radius: 15px;
          border: 2px dashed var(--border-color);
        }

        .demo-section h3 {
          color: var(--text-primary);
          margin-bottom: 15px;
          font-size: 1.2rem;
          text-align: center;
        }

        .demo-buttons {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
          gap: 10px;
        }

        .demo-btn {
          padding: 10px 16px;
          border: none;
          border-radius: 8px;
          font-size: 0.9rem;
          font-weight: 500;
          cursor: pointer;
          transition: all 0.3s ease;
          background: var(--primary-gradient);
          color: white;
        }

        .demo-btn:hover {
          transform: translateY(-2px);
          box-shadow: 0 5px 15px var(--shadow-medium);
        }

        .form-group {
          margin-bottom: 25px;
          opacity: 0;
          animation: slideInLeft 0.6s ease forwards;
          position: relative;
        }

        .form-group:nth-child(even) {
          animation-delay: 0.1s;
        }

        .form-group:nth-child(odd) {
          animation-delay: 0.2s;
        }

        @keyframes slideInLeft {
          from {
            opacity: 0;
            transform: translateX(-30px);
          }
          to {
            opacity: 1;
            transform: translateX(0);
          }
        }

        label {
          display: block;
          margin-bottom: 8px;
          font-weight: 600;
          color: var(--text-primary);
          font-size: 0.95rem;
        }

        input,
        textarea,
        select {
          width: 100%;
          padding: 14px 16px;
          border: 2px solid var(--border-color);
          border-radius: 12px;
          font-size: 1rem;
          font-family: "Inter", sans-serif;
          transition: all 0.3s ease;
          background: var(--bg-primary);
          color: var(--text-primary);
        }

        input:focus,
        textarea:focus,
        select:focus {
          outline: none;
          border-color: var(--accent-color);
          box-shadow: 0 0 0 3px var(--shadow-light);
          transform: translateY(-2px);
        }

        textarea {
          resize: vertical;
          min-height: 100px;
          font-family: "Inter", sans-serif;
        }

        /* AI Suggestions */
        .ai-suggestion-btn {
          position: absolute;
          right: 10px;
          top: 50%;
          transform: translateY(-50%);
          background: var(--primary-gradient);
          border: none;
          border-radius: 8px;
          padding: 8px 12px;
          color: white;
          cursor: pointer;
          font-size: 0.8rem;
          font-weight: 500;
          transition: all 0.3s ease;
          z-index: 10;
        }

        .ai-suggestion-btn:hover {
          transform: translateY(-50%) scale(1.05);
          box-shadow: 0 5px 15px var(--shadow-medium);
        }

        .ai-suggestions {
          background: var(--bg-primary);
          border: 2px solid var(--accent-color);
          border-radius: 12px;
          padding: 15px;
          margin-top: 10px;
          box-shadow: 0 10px 25px var(--shadow-light);
          animation: slideInUp 0.3s ease;
        }

        .ai-suggestions h4 {
          color: var(--accent-color);
          margin-bottom: 10px;
          font-size: 0.9rem;
          font-weight: 600;
        }

        .suggestion-item {
          background: var(--bg-secondary);
          padding: 10px 12px;
          margin: 5px 0;
          border-radius: 8px;
          cursor: pointer;
          transition: all 0.3s ease;
          color: var(--text-primary);
          font-size: 0.9rem;
          border-left: 3px solid var(--accent-color);
        }

        .suggestion-item:hover {
          background: var(--accent-color);
          color: white;
          transform: translateX(5px);
        }

        /* Dynamic Sections */
        .dynamic-section {
          border: 2px dashed var(--border-color);
          border-radius: 15px;
          padding: 25px;
          margin: 25px 0;
          background: var(--bg-primary);
          transition: all 0.3s ease;
        }

        .dynamic-section:hover {
          border-color: var(--accent-color);
          box-shadow: 0 8px 25px var(--shadow-light);
        }

        .dynamic-section h3 {
          color: var(--text-primary);
          margin-bottom: 20px;
          font-size: 1.3rem;
          font-weight: 600;
        }

        .dynamic-item {
          background: var(--bg-secondary);
          padding: 20px;
          margin: 15px 0;
          border-radius: 12px;
          border-left: 4px solid var(--accent-color);
          animation: slideInUp 0.4s ease;
          transition: all 0.3s ease;
        }

        .dynamic-item:hover {
          transform: translateX(5px);
          box-shadow: 0 8px 20px var(--shadow-light);
        }

        @keyframes slideInUp {
          from {
            opacity: 0;
            transform: translateY(20px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        /* Skills Section */
        .skills-container {
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
          margin-top: 15px;
        }

        .skill-tag {
          background: var(--primary-gradient);
          color: white;
          padding: 10px 16px;
          border-radius: 25px;
          font-size: 0.9rem;
          font-weight: 500;
          cursor: pointer;
          transition: all 0.3s ease;
          animation: bounceIn 0.4s ease;
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .skill-tag:hover {
          transform: translateY(-3px);
          box-shadow: 0 8px 20px var(--shadow-medium);
        }

        @keyframes bounceIn {
          0% {
            transform: scale(0);
          }
          50% {
            transform: scale(1.1);
          }
          100% {
            transform: scale(1);
          }
        }

        /* Buttons */
        .btn {
          padding: 12px 24px;
          border: none;
          border-radius: 12px;
          font-size: 1rem;
          font-weight: 600;
          font-family: "Inter", sans-serif;
          cursor: pointer;
          transition: all 0.3s ease;
          margin: 8px;
          position: relative;
          overflow: hidden;
        }

        .btn::before {
          content: "";
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
          transition: left 0.5s;
        }

        .btn:hover::before {
          left: 100%;
        }

        .btn-primary {
          background: var(--primary-gradient);
          color: white;
        }

        .btn-primary:hover {
          transform: translateY(-3px);
          box-shadow: 0 12px 30px var(--shadow-medium);
        }

        .btn-secondary {
          background: var(--bg-tertiary);
          color: var(--text-primary);
          border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
          background: var(--accent-color);
          color: white;
          border-color: var(--accent-color);
        }

        .btn-danger {
          background: #ef4444;
          color: white;
        }

        .btn-success {
          background: #10b981;
          color: white;
        }

        /* Resume Preview Section */
        .preview-section {
          padding: 40px;
          background: var(--bg-primary);
          overflow-y: auto;
          max-height: calc(100vh - 120px);
          transition: all 0.3s ease;
        }

        .resume-preview {
          max-width: 100%;
          margin: 0 auto;
          background: var(--bg-primary);
          box-shadow: 0 15px 40px var(--shadow-dark);
          border-radius: 15px;
          overflow: hidden;
          transition: all 0.3s ease;
          font-family: "Inter", sans-serif;
          border: 1px solid var(--border-color);
        }

        .resume-header {
          background: var(--primary-gradient);
          color: white;
          padding: 40px 30px;
          text-align: center;
          position: relative;
        }

        .resume-header::after {
          content: "";
          position: absolute;
          bottom: -15px;
          left: 50%;
          transform: translateX(-50%);
          width: 0;
          height: 0;
          border-left: 25px solid transparent;
          border-right: 25px solid transparent;
          border-top: 25px solid var(--primary-dark);
        }

        .resume-name {
          font-size: 2.8rem;
          font-weight: 700;
          margin-bottom: 15px;
          animation: fadeInDown 0.6s ease;
          letter-spacing: -0.5px;
        }

        .resume-contact {
          font-size: 1.2rem;
          opacity: 0.95;
          animation: fadeInUp 0.6s ease;
          font-weight: 400;
        }

        @keyframes fadeInDown {
          from {
            opacity: 0;
            transform: translateY(-20px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(20px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        .resume-content {
          padding: 35px;
        }

        .resume-section {
          margin-bottom: 35px;
          opacity: 0;
          animation: fadeIn 0.6s ease forwards;
        }

        .resume-section:nth-child(1) {
          animation-delay: 0.1s;
        }
        .resume-section:nth-child(2) {
          animation-delay: 0.2s;
        }
        .resume-section:nth-child(3) {
          animation-delay: 0.3s;
        }
        .resume-section:nth-child(4) {
          animation-delay: 0.4s;
        }

        @keyframes fadeIn {
          from {
            opacity: 0;
            transform: translateY(15px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        .resume-section h3 {
          color: var(--text-primary);
          font-size: 1.5rem;
          font-weight: 700;
          margin-bottom: 20px;
          padding-bottom: 10px;
          border-bottom: 3px solid var(--accent-color);
          position: relative;
        }

        .resume-section h3::after {
          content: "";
          position: absolute;
          bottom: -3px;
          left: 0;
          width: 60px;
          height: 3px;
          background: var(--primary-dark);
        }

        .resume-item {
          margin-bottom: 20px;
          padding: 20px;
          background: var(--bg-secondary);
          border-radius: 12px;
          border-left: 4px solid var(--accent-color);
          transition: all 0.3s ease;
          border: 1px solid var(--border-color);
        }

        .resume-item:hover {
          transform: translateX(8px);
          box-shadow: 0 8px 25px var(--shadow-light);
        }

        .resume-item h4 {
          color: var(--text-primary);
          font-size: 1.2rem;
          font-weight: 600;
          margin-bottom: 8px;
        }

        .resume-item .meta {
          color: var(--text-secondary);
          font-size: 1rem;
          margin-bottom: 12px;
          font-weight: 500;
        }

        .resume-item p {
          color: var(--text-secondary);
          line-height: 1.6;
          font-size: 0.95rem;
        }

        .skills-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
          gap: 12px;
        }

        .skill-item {
          background: var(--primary-gradient);
          color: white;
          padding: 12px 18px;
          border-radius: 25px;
          text-align: center;
          font-size: 0.95rem;
          font-weight: 600;
          animation: pulse 3s infinite;
          transition: all 0.3s ease;
        }

        .skill-item:hover {
          transform: scale(1.05);
        }

        @keyframes pulse {
          0%,
          100% {
            transform: scale(1);
          }
          50% {
            transform: scale(1.02);
          }
        }

        /* Control Buttons */
        .controls {
          text-align: center;
          margin: 30px 0;
          padding: 20px;
          background: var(--bg-secondary);
          border-radius: 15px;
          border: 1px solid var(--border-color);
        }

        /* Loading Animation */
        .loading {
          display: inline-block;
          width: 20px;
          height: 20px;
          border: 3px solid rgba(255, 255, 255, 0.3);
          border-top: 3px solid white;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }

        @keyframes spin {
          0% {
            transform: rotate(0deg);
          }
          100% {
            transform: rotate(360deg);
          }
        }

        /* POPUP SYSTEM STYLES */

        /* Base Overlay */
        .popup-overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.6);
          backdrop-filter: blur(8px);
          z-index: 10000;
          display: flex;
          align-items: center;
          justify-content: center;
          opacity: 0;
          visibility: hidden;
          transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .popup-overlay.show {
          opacity: 1;
          visibility: visible;
        }

        /* Base Popup */
        .popup {
          background: var(--bg-primary);
          border-radius: 20px;
          padding: 0;
          max-width: 500px;
          width: 90%;
          max-height: 80vh;
          overflow: hidden;
          box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
          position: relative;
          transform: scale(0.7) translateY(-50px) rotateX(15deg);
          transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
          border: 1px solid var(--border-color);
        }

        .popup-overlay.show .popup {
          transform: scale(1) translateY(0) rotateX(0deg);
        }

        /* Popup Header */
        .popup-header {
          background: var(--primary-gradient);
          color: white;
          padding: 25px 30px;
          position: relative;
          overflow: hidden;
        }

        .popup-header::before {
          content: "";
          position: absolute;
          top: -50%;
          left: -50%;
          width: 200%;
          height: 200%;
          background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
          animation: shimmerHeader 3s ease-in-out infinite;
        }

        @keyframes shimmerHeader {
          0%,
          100% {
            transform: translate(-50%, -50%) scale(0.8);
            opacity: 0;
          }
          50% {
            transform: translate(-30%, -30%) scale(1.2);
            opacity: 1;
          }
        }

        .popup-title {
          font-size: 1.5rem;
          font-weight: 700;
          margin: 0;
          position: relative;
          z-index: 1;
        }

        .popup-subtitle {
          font-size: 0.9rem;
          opacity: 0.9;
          margin-top: 5px;
          position: relative;
          z-index: 1;
        }

        .popup-close {
          position: absolute;
          top: 20px;
          right: 20px;
          background: rgba(255, 255, 255, 0.2);
          border: none;
          border-radius: 50%;
          width: 35px;
          height: 35px;
          color: white;
          cursor: pointer;
          font-size: 18px;
          display: flex;
          align-items: center;
          justify-content: center;
          transition: all 0.3s ease;
          z-index: 2;
        }

        .popup-close:hover {
          background: rgba(255, 255, 255, 0.3);
          transform: rotate(90deg) scale(1.1);
        }

        /* Popup Body */
        .popup-body {
          padding: 30px;
          max-height: 60vh;
          overflow-y: auto;
        }

        .popup-body::-webkit-scrollbar {
          width: 6px;
        }

        .popup-body::-webkit-scrollbar-track {
          background: var(--bg-tertiary);
          border-radius: 3px;
        }

        .popup-body::-webkit-scrollbar-thumb {
          background: var(--accent-color);
          border-radius: 3px;
        }

        /* Popup Footer */
        .popup-footer {
          padding: 20px 30px;
          background: var(--bg-secondary);
          border-top: 1px solid var(--border-color);
          display: flex;
          gap: 12px;
          justify-content: flex-end;
        }

        /* Animation Variants */

        /* Bounce Animation */
        .popup-bounce {
          transform: scale(0) translateY(-100px);
        }

        .popup-overlay.show .popup-bounce {
          animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
          0% {
            transform: scale(0) translateY(-100px);
          }
          50% {
            transform: scale(1.1) translateY(10px);
          }
          100% {
            transform: scale(1) translateY(0);
          }
        }

        /* Slide Animation */
        .popup-slide {
          transform: translateX(-100%);
        }

        .popup-overlay.show .popup-slide {
          animation: slideInRight 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes slideInRight {
          from {
            transform: translateX(-100%);
          }
          to {
            transform: translateX(0);
          }
        }

        /* Flip Animation */
        .popup-flip {
          transform: rotateY(-90deg) scale(0.8);
        }

        .popup-overlay.show .popup-flip {
          animation: flipIn 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes flipIn {
          0% {
            transform: rotateY(-90deg) scale(0.8);
          }
          50% {
            transform: rotateY(-45deg) scale(0.9);
          }
          100% {
            transform: rotateY(0deg) scale(1);
          }
        }

        /* Zoom Animation */
        .popup-zoom {
          transform: scale(0) rotate(180deg);
        }

        .popup-overlay.show .popup-zoom {
          animation: zoomIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes zoomIn {
          0% {
            transform: scale(0) rotate(180deg);
          }
          100% {
            transform: scale(1) rotate(0deg);
          }
        }

        /* Fade Scale Animation */
        .popup-fade-scale {
          transform: scale(1.3);
          opacity: 0;
        }

        .popup-overlay.show .popup-fade-scale {
          animation: fadeScale 0.4s ease-out;
        }

        @keyframes fadeScale {
          from {
            transform: scale(1.3);
            opacity: 0;
          }
          to {
            transform: scale(1);
            opacity: 1;
          }
        }

        /* Elastic Animation */
        .popup-elastic {
          transform: scale(0);
        }

        .popup-overlay.show .popup-elastic {
          animation: elasticIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes elasticIn {
          0% {
            transform: scale(0);
          }
          50% {
            transform: scale(1.2);
          }
          75% {
            transform: scale(0.9);
          }
          100% {
            transform: scale(1);
          }
        }

        /* Popup Types */

        /* Success Popup */
        .popup-success .popup-header {
          background: linear-gradient(135deg, #10b981, #059669);
        }

        .popup-success .popup-icon {
          width: 60px;
          height: 60px;
          background: rgba(255, 255, 255, 0.2);
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 30px;
          margin: 0 auto 20px;
          animation: successPulse 2s infinite;
        }

        @keyframes successPulse {
          0%,
          100% {
            transform: scale(1);
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
          }
          50% {
            transform: scale(1.05);
            box-shadow: 0 0 0 20px rgba(16, 185, 129, 0);
          }
        }

        /* Error Popup */
        .popup-error .popup-header {
          background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .popup-error .popup-icon {
          width: 60px;
          height: 60px;
          background: rgba(255, 255, 255, 0.2);
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 30px;
          margin: 0 auto 20px;
          animation: errorShake 0.5s ease-in-out;
        }

        @keyframes errorShake {
          0%,
          100% {
            transform: translateX(0);
          }
          25% {
            transform: translateX(-5px);
          }
          75% {
            transform: translateX(5px);
          }
        }

        /* Warning Popup */
        .popup-warning .popup-header {
          background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .popup-warning .popup-icon {
          width: 60px;
          height: 60px;
          background: rgba(255, 255, 255, 0.2);
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 30px;
          margin: 0 auto 20px;
          animation: warningBlink 1s infinite;
        }

        @keyframes warningBlink {
          0%,
          50% {
            opacity: 1;
          }
          51%,
          100% {
            opacity: 0.7;
          }
        }

        /* Info Popup */
        .popup-info .popup-header {
          background: var(--primary-gradient);
        }

        .popup-info .popup-icon {
          width: 60px;
          height: 60px;
          background: rgba(255, 255, 255, 0.2);
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 30px;
          margin: 0 auto 20px;
          animation: infoRotate 3s linear infinite;
        }

        @keyframes infoRotate {
          from {
            transform: rotate(0deg);
          }
          to {
            transform: rotate(360deg);
          }
        }

        /* Loading Popup */
        .popup-loading .popup-header {
          background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .popup-loading .popup-icon {
          width: 60px;
          height: 60px;
          border: 4px solid rgba(255, 255, 255, 0.3);
          border-top: 4px solid white;
          border-radius: 50%;
          margin: 0 auto 20px;
          animation: loadingSpin 1s linear infinite;
        }

        @keyframes loadingSpin {
          from {
            transform: rotate(0deg);
          }
          to {
            transform: rotate(360deg);
          }
        }

        /* Form Popup */
        .popup-form .popup-body {
          padding: 20px 30px;
        }

        .popup-form .form-group {
          margin-bottom: 20px;
          animation: none;
          opacity: 1;
        }

        .popup-form input,
        .popup-form textarea,
        .popup-form select {
          width: 100%;
          padding: 12px 16px;
          border: 2px solid var(--border-color);
          border-radius: 8px;
          font-size: 0.95rem;
          transition: all 0.3s ease;
        }

        .popup-form input:focus,
        .popup-form textarea:focus,
        .popup-form select:focus {
          border-color: var(--accent-color);
          box-shadow: 0 0 0 3px var(--shadow-light);
        }

        /* Image Popup */
        .popup-image {
          max-width: 90vw;
          max-height: 90vh;
          padding: 0;
        }

        .popup-image .popup-body {
          padding: 0;
          text-align: center;
        }

        .popup-image img {
          max-width: 100%;
          height: auto;
          border-radius: 0 0 20px 20px;
        }

        /* Confirmation Popup */
        .popup-confirm .popup-body {
          text-align: center;
          padding: 40px 30px;
        }

        .popup-confirm .confirm-icon {
          width: 80px;
          height: 80px;
          background: var(--primary-gradient);
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 40px;
          color: white;
          margin: 0 auto 20px;
          animation: confirmPulse 2s infinite;
        }

        @keyframes confirmPulse {
          0%,
          100% {
            transform: scale(1);
          }
          50% {
            transform: scale(1.1);
          }
        }

        /* Progress Popup */
        .popup-progress .progress-bar-popup {
          width: 100%;
          height: 8px;
          background: var(--bg-tertiary);
          border-radius: 4px;
          overflow: hidden;
          margin: 20px 0;
        }

        .popup-progress .progress-fill {
          height: 100%;
          background: var(--primary-gradient);
          border-radius: 4px;
          transition: width 0.3s ease;
          position: relative;
        }

        .popup-progress .progress-fill::after {
          content: "";
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
          animation: progressShimmer 1.5s infinite;
        }

        @keyframes progressShimmer {
          0% {
            transform: translateX(-100%);
          }
          100% {
            transform: translateX(100%);
          }
        }

        /* Popup Buttons */
        .popup-btn {
          padding: 12px 24px;
          border: none;
          border-radius: 8px;
          font-size: 0.95rem;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.3s ease;
          position: relative;
          overflow: hidden;
        }

        .popup-btn::before {
          content: "";
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
          transition: left 0.5s;
        }

        .popup-btn:hover::before {
          left: 100%;
        }

        .popup-btn-primary {
          background: var(--primary-gradient);
          color: white;
        }

        .popup-btn-primary:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 20px var(--shadow-medium);
        }

        .popup-btn-secondary {
          background: var(--bg-tertiary);
          color: var(--text-primary);
          border: 2px solid var(--border-color);
        }

        .popup-btn-secondary:hover {
          background: var(--bg-secondary);
          border-color: var(--accent-color);
        }

        .popup-btn-danger {
          background: linear-gradient(135deg, #ef4444, #dc2626);
          color: white;
        }

        .popup-btn-success {
          background: linear-gradient(135deg, #10b981, #059669);
          color: white;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
          .popup {
            width: 95%;
            margin: 20px;
          }

          .popup-header {
            padding: 20px;
          }

          .popup-body {
            padding: 20px;
          }

          .popup-footer {
            padding: 15px 20px;
            flex-direction: column;
          }

          .popup-btn {
            width: 100%;
            margin-bottom: 10px;
          }
        }

        @media (max-width: 1024px) {
          .main-content {
            grid-template-columns: 1fr;
          }

          .form-section,
          .preview-section {
            max-height: none;
          }

          .resume-name {
            font-size: 2.2rem;
          }
        }

        @media (max-width: 768px) {
          body {
            padding: 10px;
          }

          .app-header {
            padding: 15px 20px;
            flex-direction: column;
            gap: 15px;
          }

          .form-section,
          .preview-section {
            padding: 25px;
          }

          .form-section h2 {
            font-size: 1.6rem;
          }

          .resume-name {
            font-size: 2rem;
          }

          .skills-grid {
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
          }
        }

        @media (max-width: 480px) {
          .app-title {
            font-size: 1.4rem;
          }

          .form-section h2 {
            font-size: 1.4rem;
          }

          .resume-name {
            font-size: 1.8rem;
          }

          .btn {
            padding: 10px 20px;
            font-size: 0.9rem;
          }

          .skills-container {
            justify-content: center;
          }
        }

        /* Print Styles */
        @media print {
          body {
            background: white;
            padding: 0;
            font-family: "Inter", Arial, sans-serif;
          }

          .container {
            box-shadow: none;
            border-radius: 0;
          }

          .app-header,
          .progress-container {
            display: none;
          }

          .main-content {
            grid-template-columns: 1fr;
          }

          .form-section {
            display: none;
          }

          .preview-section {
            padding: 0;
            max-height: none;
          }

          .controls {
            display: none;
          }

          .resume-preview {
            box-shadow: none;
            font-family: "Inter", Arial, sans-serif;
          }

          .resume-name,
          .resume-item h4,
          .resume-section h3 {
            color: #333 !important;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
          }

          .resume-item,
          .resume-section {
            color: #333 !important;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
          }
        }

        /* PDF-specific improvements */
        @media print, screen {
          .resume-preview {
            font-family: Arial, sans-serif !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
          }

          .resume-preview * {
            font-family: Arial, sans-serif !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
          }

          .resume-name {
            font-family: Arial, sans-serif !important;
            font-weight: bold !important;
            letter-spacing: -0.5px;
          }

          .resume-section h3 {
            font-family: Arial, sans-serif !important;
            font-weight: bold !important;
          }

          .resume-item h4 {
            font-family: Arial, sans-serif !important;
            font-weight: bold !important;
          }

          .resume-item p,
          .resume-item .meta {
            font-family: Arial, sans-serif !important;
          }
        }

        /* High DPI display improvements */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
          .resume-preview {
            -webkit-font-smoothing: subpixel-antialiased;
          }
        }

        @keyframes loadingDots {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-header">
            <div class="app-title">
                🤖 AI Resume Builder
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="themeIcon">🌙</span>
                <span id="themeText">Dark Mode</span>
            </button>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="main-content">
            <!-- Form Section -->
            <div class="form-section">
                <h2>Build Your Resume</h2>
                
                <!-- Demo Popup Section -->
                <div class="demo-section">
                    <h3>🎭 Demo Popup Gallery</h3>
                    <div class="demo-buttons">
                        <button class="demo-btn" onclick="showSuccessPopup()">✅ Success Popup</button>
                        <button class="demo-btn" onclick="showErrorPopup()">❌ Error Popup</button>
                        <button class="demo-btn" onclick="showWarningPopup()">⚠️ Warning Popup</button>
                        <button class="demo-btn" onclick="showInfoPopup()">ℹ️ Info Popup</button>
                        <button class="demo-btn" onclick="showConfirmPopup()">❓ Confirm Popup</button>
                        <button class="demo-btn" onclick="showFormPopup()">📝 Form Popup</button>
                        <button class="demo-btn" onclick="showLoadingPopup()">⏳ Loading Popup</button>
                        <button class="demo-btn" onclick="showProgressPopup()">📊 Progress Popup</button>
                        <button class="demo-btn" onclick="showImagePopup()">🖼️ Image Popup</button>
                        <button class="demo-btn" onclick="showAnimationDemo()">🎬 Animation Demo</button>
                    </div>
                </div>
                
                <form id="resumeForm">
                    <!-- Personal Information -->
                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" name="fullName" required>
                        <button type="button" class="ai-suggestion-btn" onclick="showAISuggestions('fullName')">✨ AI</button>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="summary">Profile Summary</label>
                        <textarea id="summary" name="summary" placeholder="Brief description about yourself..."></textarea>
                        <button type="button" class="ai-suggestion-btn" onclick="showAISuggestions('summary')">✨ AI</button>
                    </div>
                    
                    <!-- Skills Section -->
                    <div class="dynamic-section">
                        <h3>Skills</h3>
                        <div class="form-group">
                            <label for="skillInput">Add Skill</label>
                            <input type="text" id="skillInput" placeholder="Enter a skill and press Enter">
                            <button type="button" class="ai-suggestion-btn" onclick="showAISuggestions('skills')">✨ AI</button>
                            <div class="skills-container" id="skillsContainer"></div>
                        </div>
                    </div>
                    
                    <!-- Education Section -->
                    <div class="dynamic-section">
                        <h3>Education</h3>
                        <div id="educationContainer">
                            <div class="dynamic-item education-item">
                                <div class="form-group">
                                    <label>Institution</label>
                                    <input type="text" name="education[0][institution]" placeholder="University/School name">
                                </div>
                                <div class="form-group">
                                    <label>Degree</label>
                                    <input type="text" name="education[0][degree]" placeholder="Degree/Certificate">
                                    <button type="button" class="ai-suggestion-btn" onclick="showAISuggestions('degree')">✨ AI</button>
                                </div>
                                <div class="form-group">
                                    <label>Year</label>
                                    <input type="text" name="education[0][year]" placeholder="2020-2024">
                                </div>
                                <button type="button" class="btn btn-danger" onclick="removeEducation(this)">Remove</button>
                            </div>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="addEducation()">Add Education</button>
                    </div>
                    
                    <!-- Experience Section -->
                    <div class="dynamic-section">
                        <h3>Experience</h3>
                        <div id="experienceContainer">
                            <div class="dynamic-item experience-item">
                                <div class="form-group">
                                    <label>Company</label>
                                    <input type="text" name="experience[0][company]" placeholder="Company name">
                                </div>
                                <div class="form-group">
                                    <label>Position</label>
                                    <input type="text" name="experience[0][position]" placeholder="Job title">
                                    <button type="button" class="ai-suggestion-btn" onclick="showAISuggestions('position')">✨ AI</button>
                                </div>
                                <div class="form-group">
                                    <label>Duration</label>
                                    <input type="text" name="experience[0][duration]" placeholder="Jan 2020 - Present">
                                </div>
                                <div class="form-group">
                                    <label>Description</label>
                                    <textarea name="experience[0][description]" placeholder="Job responsibilities..."></textarea>
                                    <button type="button" class="ai-suggestion-btn" onclick="showAISuggestions('experience')">✨ AI</button>
                                </div>
                                <button type="button" class="btn btn-danger" onclick="removeExperience(this)">Remove</button>
                            </div>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="addExperience()">Add Experience</button>
                    </div>
                    
                    <!-- Control Buttons -->
                    <div class="controls">
                        <button type="button" class="btn btn-secondary" onclick="clearForm()">Clear Form</button>
                        <button type="button" class="btn btn-success" onclick="downloadPDF()">
                            <span id="downloadText">📄 Download PDF</span>
                            <span id="downloadLoading" class="loading" style="display: none;"></span>
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Preview Section -->
            <div class="preview-section">
                <div class="resume-preview" id="resumePreview">
                    <div class="resume-header">
                        <div class="resume-name" id="previewName">Your Name</div>
                        <div class="resume-contact" id="previewContact">
                            <div id="previewEmail">your.email@example.com</div>
                            <div id="previewPhone">+1 (555) 123-4567</div>
                        </div>
                    </div>
                    
                    <div class="resume-content">
                        <div class="resume-section" id="summarySection" style="display: none;">
                            <h3>Profile Summary</h3>
                            <p id="previewSummary"></p>
                        </div>
                        
                        <div class="resume-section" id="skillsSection" style="display: none;">
                            <h3>Skills</h3>
                            <div class="skills-grid" id="previewSkills"></div>
                        </div>
                        
                        <div class="resume-section" id="educationSection" style="display: none;">
                            <h3>Education</h3>
                            <div id="previewEducation"></div>
                        </div>
                        
                        <div class="resume-section" id="experienceSection" style="display: none;">
                            <h3>Experience</h3>
                            <div id="previewExperience"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script>
        // Global variables
        let educationCount = 1;
        let experienceCount = 1;
        let skills = [];
        let currentTheme = "light";

        // AI Suggestions Database
        const aiSuggestions = {
          fullName: [
            "Use your full legal name as it appears on official documents",
            "Consider using a professional nickname if commonly known by it",
            "Avoid using titles like Mr., Ms., Dr. unless specifically required",
          ],
          summary: [
            "Results-driven professional with X years of experience in [industry]",
            "Passionate [role] with expertise in [key skills] and proven track record of [achievements]",
            "Dynamic professional specializing in [area] with strong background in [relevant experience]",
            "Innovative [profession] with demonstrated ability to [key accomplishment]",
            "Experienced [role] committed to delivering high-quality results and driving organizational success",
          ],
          skills: [
            "JavaScript",
            "Python",
            "React",
            "Node.js",
            "SQL",
            "Git",
            "AWS",
            "Docker",
            "Project Management",
            "Data Analysis",
            "Machine Learning",
            "UI/UX Design",
            "Digital Marketing",
            "Content Writing",
            "Public Speaking",
            "Leadership",
            "Problem Solving",
            "Critical Thinking",
            "Communication",
            "Teamwork",
          ],
          degree: [
            "Bachelor of Science in Computer Science",
            "Master of Business Administration (MBA)",
            "Bachelor of Arts in Marketing",
            "Master of Science in Data Science",
            "Bachelor of Engineering in Software Engineering",
            "Certificate in Digital Marketing",
            "Associate Degree in Web Development",
          ],
          position: [
            "Software Developer",
            "Project Manager",
            "Data Analyst",
            "Marketing Specialist",
            "UX/UI Designer",
            "Business Analyst",
            "Sales Representative",
            "Content Creator",
            "Operations Manager",
            "Customer Success Manager",
            "Product Manager",
            "DevOps Engineer",
          ],
          experience: [
            "Developed and maintained web applications using modern frameworks",
            "Led cross-functional teams to deliver projects on time and within budget",
            "Analyzed complex datasets to identify trends and business opportunities",
            "Implemented marketing strategies that increased brand awareness by X%",
            "Collaborated with stakeholders to gather requirements and define project scope",
            "Optimized processes resulting in X% improvement in efficiency",
            "Managed client relationships and achieved X% customer satisfaction rate",
          ],
        };

        // Initialize the application
        document.addEventListener("DOMContentLoaded", () => {
          loadTheme();
          setupEventListeners();
          updatePreview();
          updateProgress();
        });

        function setupEventListeners() {
          // Real-time form updates
          const form = document.getElementById("resumeForm");
          form.addEventListener("input", (e) => {
            updatePreview();
            updateProgress();
          });

          // Skills input
          const skillInput = document.getElementById("skillInput");
          skillInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              addSkill();
            }
          });

          // Close popup on overlay click
          document.addEventListener("click", (e) => {
            if (e.target.classList.contains("popup-overlay")) {
              closePopup();
            }
          });

          // Close popup on Escape key
          document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
              closePopup();
            }
          });
        }

        // Theme Management
        function toggleTheme() {
          currentTheme = currentTheme === "light" ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", currentTheme);

          const themeIcon = document.getElementById("themeIcon");
          const themeText = document.getElementById("themeText");

          if (currentTheme === "dark") {
            themeIcon.textContent = "☀️";
            themeText.textContent = "Light Mode";
          } else {
            themeIcon.textContent = "🌙";
            themeText.textContent = "Dark Mode";
          }

          localStorage.setItem("theme", currentTheme);
        }

        function loadTheme() {
          const savedTheme = localStorage.getItem("theme") || "light";
          currentTheme = savedTheme;
          document.documentElement.setAttribute("data-theme", currentTheme);

          const themeIcon = document.getElementById("themeIcon");
          const themeText = document.getElementById("themeText");

          if (currentTheme === "dark") {
            themeIcon.textContent = "☀️";
            themeText.textContent = "Light Mode";
          } else {
            themeIcon.textContent = "🌙";
            themeText.textContent = "Dark Mode";
          }
        }

        // AI Suggestions
        function showAISuggestions(type) {
          // Remove existing suggestions
          const existingSuggestions = document.querySelector(".ai-suggestions");
          if (existingSuggestions) {
            existingSuggestions.remove();
          }

          const suggestions = aiSuggestions[type];
          if (!suggestions) return;

          const suggestionsDiv = document.createElement("div");
          suggestionsDiv.className = "ai-suggestions";

          const title = document.createElement("h4");
          title.textContent = "🤖 AI Suggestions:";
          suggestionsDiv.appendChild(title);

          suggestions.forEach((suggestion) => {
            const suggestionItem = document.createElement("div");
            suggestionItem.className = "suggestion-item";
            suggestionItem.textContent = suggestion;
            suggestionItem.onclick = () => applySuggestion(type, suggestion);
            suggestionsDiv.appendChild(suggestionItem);
          });

          // Find the appropriate input field and add suggestions after it
          let targetElement;
          if (type === "fullName") {
            targetElement = document.getElementById("fullName").parentElement;
          } else if (type === "summary") {
            targetElement = document.getElementById("summary").parentElement;
          } else if (type === "skills") {
            targetElement = document.getElementById("skillInput").parentElement;
          } else if (type === "degree") {
            targetElement = event.target.closest(".form-group");
          } else if (type === "position") {
            targetElement = event.target.closest(".form-group");
          } else if (type === "experience") {
            targetElement = event.target.closest(".form-group");
          }

          if (targetElement) {
            targetElement.appendChild(suggestionsDiv);
          }
        }

        function applySuggestion(type, suggestion) {
          if (type === "fullName") {
            showInfoPopup();
          } else if (type === "summary") {
            document.getElementById("summary").value = suggestion;
          } else if (type === "skills") {
            if (!skills.includes(suggestion)) {
              skills.push(suggestion);
              updateSkillsDisplay();
              updateSkillsPreview();
            }
          } else if (type === "degree") {
            const input = event.target.closest(".form-group").querySelector("input");
            input.value = suggestion;
          } else if (type === "position") {
            const input = event.target.closest(".form-group").querySelector("input");
            input.value = suggestion;
          } else if (type === "experience") {
            const textarea = event.target.closest(".form-group").querySelector("textarea");
            textarea.value = suggestion;
          }

          // Remove suggestions after applying
          const suggestionsDiv = document.querySelector(".ai-suggestions");
          if (suggestionsDiv) {
            suggestionsDiv.remove();
          }

          updatePreview();
          updateProgress();
        }

        function updateProgress() {
          const requiredFields = ["fullName", "email", "phone"];
          const optionalSections = [
            document.getElementById("summary").value.trim(),
            skills.length > 0,
            document.querySelectorAll('.education-item input[value!=""]').length > 0,
            document.querySelectorAll('.experience-item input[value!=""], .experience-item textarea[value!=""]').length > 0,
          ];

          let filledRequired = 0;
          requiredFields.forEach((fieldId) => {
            if (document.getElementById(fieldId).value.trim()) {
              filledRequired++;
            }
          });

          let filledOptional = 0;
          optionalSections.forEach((section) => {
            if (section) filledOptional++;
          });

          const totalProgress = (filledRequired / requiredFields.length) * 60 + (filledOptional / optionalSections.length) * 40;
          document.getElementById("progressBar").style.width = totalProgress + "%";
        }

        function addSkill() {
          const skillInput = document.getElementById("skillInput");
          const skill = skillInput.value.trim();

          if (skill && !skills.includes(skill)) {
            skills.push(skill);
            skillInput.value = "";
            updateSkillsDisplay();
            updateSkillsPreview();
            updateProgress();
          }
        }

        function removeSkill(skill) {
          skills = skills.filter((s) => s !== skill);
          updateSkillsDisplay();
          updateSkillsPreview();
          updateProgress();
        }

        function updateSkillsDisplay() {
          const container = document.getElementById("skillsContainer");
          container.innerHTML = "";

          skills.forEach((skill) => {

            skillTag.className = "skill-tag";

          // Create overlay
          const overlay = document.createElement("div");
          overlay.className = "popup-overlay";

          // Create popup
          const popup = document.createElement("div");
          popup.className = `popup popup-${type} popup-${animationType}`;

          overlay.appendChild(popup);
          document.body.appendChild(overlay);

          return { overlay, popup };

          let hasEducation = false;

          educationItems.forEach((item) => {
            const institution = item.querySelector('input[name*="[institution]"]').value;
            const degree = item.querySelector('input[name*="[degree]"]').value;
            const year = item.querySelector('input[name*="[year]"]').value;

            if (institution || degree || year) {
              hasEducation = true;
              const educationDiv = document.createElement("div");
              educationDiv.className = "resume-item";
              educationDiv.innerHTML = `
                        <h4>${degree || "Degree"}</h4>
                        <div class="meta">${institution || "Institution"} ${year ? `• ${year}` : ""}</div>
                    `;
              previewEducation.appendChild(educationDiv);
            }
          });

          educationSection.style.display = hasEducation ? "block" : "none";
        }

        function addExperience() {
          const container = document.getElementById("experienceContainer");
          const experienceItem = document.createElement("div");
          experienceItem.className = "dynamic-item experience-item";
          experienceItem.innerHTML = `
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" name="experience[${experienceCount}][company]" placeholder="Company name">
                </div>
                <div class="form-group">
                    <label>Position</label>
                    <input type="text" name="experience[${experienceCount}][position]" placeholder="Job title">
                    <button type="button" class="ai-suggestion-btn" onclick="showAISuggestions('position')">✨ AI</button>
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <input type="text" name="experience[${experienceCount}][duration]" placeholder="Jan 2020 - Present">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="experience[${experienceCount}][description]" placeholder="Job responsibilities..."></textarea>
                    <button type="button" class="ai-suggestion-btn" onclick="showAISuggestions('experience')">✨ AI</button>
                </div>
                <button type="button" class="btn btn-danger" onclick="removeExperience(this)">Remove</button>
            `;

          container.appendChild(experienceItem);
          experienceCount++;

          // Add event listeners to new inputs
          const inputs = experienceItem.querySelectorAll("input, textarea");
          inputs.forEach((input) => {
            input.addEventListener("input", () => {
              updatePreview();
              updateProgress();
            });
          });
        }

        function removeExperience(button) {
          button.parentElement.remove();
          updatePreview();
          updateProgress();
        }

        function updateExperiencePreview() {
          const experienceItems = document.querySelectorAll(".experience-item");
          const previewExperience = document.getElementById("previewExperience");
          const experienceSection = document.getElementById("experienceSection");

          previewExperience.innerHTML = "";
          let hasExperience = false;

          experienceItems.forEach((item) => {
            const company = item.querySelector('input[name*="[company]"]').value;
            const position = item.querySelector('input[name*="[position]"]').value;
            const duration = item.querySelector('input[name*="[duration]"]').value;
            const description = item.querySelector('textarea[name*="[description]"]').value;

            if (company || position || duration || description) {
              hasExperience = true;
              const experienceDiv = document.createElement("div");
              experienceDiv.className = "resume-item";
              experienceDiv.innerHTML = `
                        <h4>${position || "Position"}</h4>
                        <div class="meta">${company || "Company"} ${duration ? `• ${duration}` : ""}</div>
                        ${description ? `<p>${description}</p>` : ""}
                    `;
              previewExperience.appendChild(experienceDiv);
            }
          });

          experienceSection.style.display = hasExperience ? "block" : "none";
        }

        async function downloadPDF() {
          const downloadText = document.getElementById("downloadText");
          const downloadLoading = document.getElementById("downloadLoading");

          downloadText.style.display = "none";
          downloadLoading.style.display = "inline-block";

          try {
            showLoadingPopup();

            const { jsPDF } = window.jspdf;
            const resumeElement = document.getElementById("resumePreview");

            // Store original theme and force light theme for PDF
            const originalTheme = currentTheme;
            if (currentTheme === "dark") {
              document.documentElement.setAttribute("data-theme", "light");
            }

            // Create a clone of the resume for PDF generation
            const resumeClone = resumeElement.cloneNode(true);
            resumeClone.style.position = "absolute";
            resumeClone.style.left = "-9999px";
            resumeClone.style.top = "0";
            resumeClone.style.width = "794px";
            resumeClone.style.fontFamily = "Arial, sans-serif";
            resumeClone.style.fontSize = "14px";
            resumeClone.style.lineHeight = "1.4";
            resumeClone.style.color = "#000000";
            resumeClone.style.backgroundColor = "#ffffff";

            // Apply PDF-specific styles to the clone
            const allElements = resumeClone.querySelectorAll("*");
            allElements.forEach((el) => {
              el.style.fontFamily = "Arial, sans-serif";
              el.style.color = "#000000";
              el.style.webkitFontSmoothing = "antialiased";
              el.style.mozOsxFontSmoothing = "grayscale";
              el.style.textRendering = "optimizeLegibility";

              if (el.classList.contains("resume-name")) {
                el.style.fontSize = "28px";
                el.style.fontWeight = "bold";
                el.style.color = "#ffffff";
              }
              if (el.tagName === "H3") {
                el.style.fontSize = "18px";
                el.style.fontWeight = "bold";
                el.style.color = "#000000";
              }
              if (el.tagName === "H4") {
                el.style.fontSize = "16px";
                el.style.fontWeight = "bold";
                el.style.color = "#000000";
              }
              if (el.classList.contains("meta")) {
                el.style.fontSize = "13px";
                el.style.color = "#666666";
              }
              if (el.tagName === "P") {
                el.style.fontSize = "14px";
                el.style.color = "#333333";
                el.style.lineHeight = "1.5";
              }
            });

            document.body.appendChild(resumeClone);

            await new Promise((resolve) => setTimeout(resolve, 500));

            const canvas = await window.html2canvas(resumeClone, {
              scale: 4,
              useCORS: true,
              allowTaint: true,
              backgroundColor: "#ffffff",
              letterRendering: true,
              logging: false,
              width: 794,
              height: resumeClone.scrollHeight,
              windowWidth: 794,
              windowHeight: resumeClone.scrollHeight,
              onclone: (clonedDoc) => {
                const style = clonedDoc.createElement("style");
                style.textContent = `
                            * {
                                font-family: Arial, sans-serif !important;
                                -webkit-font-smoothing: antialiased !important;
                                -moz-osx-font-smoothing: grayscale !important;
                                text-rendering: optimizeLegibility !important;
                            }
                        `;
                clonedDoc.head.appendChild(style);
              },
            });

            document.body.removeChild(resumeClone);
            document.documentElement.setAttribute("data-theme", originalTheme);

            const imgData = canvas.toDataURL("image/png", 1.0);
            const pdf = new jsPDF({
              orientation: "portrait",
              unit: "mm",
              format: "a4",
              compress: false,
            });

            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();
            const imgWidth = pdfWidth;
            const imgHeight = (canvas.height * pdfWidth) / canvas.width;

            let heightLeft = imgHeight;
            let position = 0;

            pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight, "", "FAST");
            heightLeft -= pdfHeight;

            while (heightLeft >= 0) {
              position = heightLeft - imgHeight;
              pdf.addPage();
              pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight, "", "FAST");
              heightLeft -= pdfHeight;
            }

            const fileName = document.getElementById("fullName").value || "Resume";
            pdf.save(`${fileName.replace(/\s+/g, "_")}_Resume.pdf`);
          } catch (error) {
            console.error("Error generating PDF:", error);
            closePopup();
            showErrorPopup();
          } finally {
            downloadText.style.display = "inline";
            downloadLoading.style.display = "none";
          }
        }
    </script>
</body>
